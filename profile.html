<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LeadFlow CRM — Your profile." />
  <meta name="theme-color" content="#EEF1F6" />
  <title>Profile — LeadFlow CRM</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="app-body light" data-page="profile">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar__header">
      <a class="brand" href="dashboard.html">
        <span class="brand__mark"><i class="fa-solid fa-bolt"></i></span>
        <span class="brand__text"><span class="brand__name">LeadFlow</span><span class="brand__tag">CRM</span></span>
      </a>
    </div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar__footer">LeadFlow CRM v1.0</div>
  </aside>

  <div class="app-main">
    <header class="navbar">
      <button type="button" class="btn btn--ghost btn--icon sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
      <div class="navbar__search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" id="globalSearch" placeholder="Search…" disabled aria-hidden="true" />
      </div>
      <div class="navbar__actions">
        <button type="button" class="btn btn--ghost btn--icon" id="themeToggle"><i class="fa-solid fa-moon" id="themeToggleIcon"></i></button>
        <div class="user-menu">
          <button type="button" class="user-menu__btn" id="userMenuBtn" aria-expanded="false">
            <span class="user-avatar" id="navAvatar">A</span>
            <span class="user-menu__info"><span class="user-menu__name" id="navUserName">User</span><span class="user-menu__role" id="navUserRole">Role</span></span>
            <i class="fa-solid fa-chevron-down" style="font-size:0.65rem;color:var(--text-faint)"></i>
          </button>
          <div class="user-dropdown" id="userDropdown">
            <div class="user-dropdown__header">
              <span class="user-avatar" id="dropdownAvatar">A</span>
              <div><div class="user-dropdown__name" id="dropdownName">User</div><div class="user-dropdown__email" id="dropdownEmail"></div></div>
            </div>
            <a href="profile.html" class="user-dropdown__link"><i class="fa-solid fa-user"></i> Profile</a>
            <a href="settings.html" class="user-dropdown__link"><i class="fa-solid fa-gear"></i> Settings</a>
            <button type="button" class="user-dropdown__link user-dropdown__link--danger" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Log out</button>
          </div>
        </div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Profile</h1>
          <p class="page-subtitle">Manage your account information and view your stats.</p>
        </div>
      </div>

      <div class="profile-layout">
        <aside class="profile-card" id="profileCard">
          <div class="profile-card__avatar" id="profileAvatar">A</div>
          <div class="profile-card__name" id="profileName">User</div>
          <div class="profile-card__title" id="profileTitle">Title</div>
          <span class="badge badge--accent" id="profileRoleBadge" style="margin-top:0.5rem">Member</span>
          <div class="profile-card__stats">
            <div>
              <div class="profile-stat__value" id="profileLeadCount">0</div>
              <div class="profile-stat__label">My Leads</div>
            </div>
            <div>
              <div class="profile-stat__value" id="profileWonCount">0</div>
              <div class="profile-stat__label">Won</div>
            </div>
          </div>
          <p class="form-hint" style="margin-top:1rem;text-align:left" id="profileLastLogin">Last login: —</p>
        </aside>

        <section class="panel-card">
          <div class="panel-card__header">
            <h2 class="panel-card__title"><i class="fa-solid fa-user-pen"></i> Edit Profile</h2>
          </div>
          <div class="panel-card__body">
            <form id="profileForm" novalidate>
              <div class="form-grid form-grid--2">
                <div class="form-field">
                  <label class="form-label" for="profileFullName">Full Name</label>
                  <input class="form-input" type="text" id="profileFullName" required />
                </div>
                <div class="form-field">
                  <label class="form-label" for="profileEmail">Email</label>
                  <input class="form-input" type="email" id="profileEmail" />
                </div>
                <div class="form-field">
                  <label class="form-label" for="profilePhone">Phone</label>
                  <input class="form-input" type="tel" id="profilePhone" />
                </div>
                <div class="form-field">
                  <label class="form-label" for="profileDepartment">Department</label>
                  <input class="form-input" type="text" id="profileDepartment" />
                </div>
                <div class="form-field">
                  <label class="form-label" for="profileJobTitle">Job Title</label>
                  <input class="form-input" type="text" id="profileJobTitle" />
                </div>
                <div class="form-field">
                  <label class="form-label">Username</label>
                  <input class="form-input" type="text" id="profileUsername" readonly />
                </div>
              </div>
              <div class="form-field">
                <label class="form-label" for="profileBio">Bio</label>
                <textarea class="form-textarea" id="profileBio" placeholder="Tell us about yourself…"></textarea>
              </div>
              <hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0" />
              <h3 style="font-size:0.9rem;font-weight:700;margin-bottom:1rem">Change Password</h3>
              <div class="form-grid form-grid--2">
                <div class="form-field">
                  <label class="form-label" for="profileNewPassword">New Password</label>
                  <input class="form-input" type="password" id="profileNewPassword" minlength="6" placeholder="Leave blank to keep current" />
                </div>
                <div class="form-field">
                  <label class="form-label" for="profileConfirmPassword">Confirm Password</label>
                  <input class="form-input" type="password" id="profileConfirmPassword" minlength="6" />
                </div>
              </div>
              <button type="submit" class="btn btn--primary" style="margin-top:0.5rem"><i class="fa-solid fa-check"></i> Save Profile</button>
            </form>
          </div>
        </section>
      </div>

      <!-- Recent activity for this user -->
      <section class="panel-card" style="margin-top:1.5rem">
        <div class="panel-card__header">
          <h2 class="panel-card__title"><i class="fa-solid fa-clock-rotate-left"></i> Your Recent Activity</h2>
        </div>
        <div class="panel-card__body">
          <div class="timeline" id="profileActivity"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    (function () {
      "use strict";
      var LF = window.LeadFlow;
      var session = LF.initAppShell("profile");
      if (!session) return;

      var user = LF.getCurrentUserRecord(session);
      if (!user) return;

      function renderProfile() {
        user = LF.getCurrentUserRecord(session);
        var avatar = document.getElementById("profileAvatar");
        avatar.textContent = user.username.charAt(0).toUpperCase();
        avatar.style.background = user.avatarColor;

        document.getElementById("profileName").textContent = user.name;
        document.getElementById("profileTitle").textContent = user.title || "—";
        document.getElementById("profileRoleBadge").textContent = user.role === "admin" ? "Administrator" : "Team Member";
        document.getElementById("profileLastLogin").textContent = "Last login: " + (user.lastLogin ? LF.formatDisplayDateTime(user.lastLogin) : "—");

        var myLeads = LF.getLeads().filter(function (l) { return l.addedBy === user.username; });
        LF.animateCounter(document.getElementById("profileLeadCount"), myLeads.length);
        LF.animateCounter(document.getElementById("profileWonCount"), myLeads.filter(function (l) { return l.leadStatus === "Won"; }).length);

        document.getElementById("profileFullName").value = user.name;
        document.getElementById("profileEmail").value = user.email || "";
        document.getElementById("profilePhone").value = user.phone || "";
        document.getElementById("profileDepartment").value = user.department || "";
        document.getElementById("profileJobTitle").value = user.title || "";
        document.getElementById("profileUsername").value = user.username;
        document.getElementById("profileBio").value = user.bio || "";

        var activities = LF.getActivities().filter(function (a) { return a.user === user.username; }).slice(0, 15);
        var timeline = document.getElementById("profileActivity");
        if (activities.length === 0) {
          timeline.innerHTML = '<div class="table-empty"><i class="fa-solid fa-clock"></i>No recent activity.</div>';
        } else {
          timeline.innerHTML = activities.map(function (a) {
            return '<div class="timeline__item"><span class="timeline__dot timeline__dot--system"><i class="fa-solid fa-circle"></i></span><div><div class="timeline__message">' +
              LF.escapeHtml(a.message) + '</div><div class="timeline__meta">' + LF.formatDisplayDateTime(a.timestamp) + "</div></div></div>";
          }).join("");
        }
      }

      document.getElementById("profileForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var newPass = document.getElementById("profileNewPassword").value;
        var confirmPass = document.getElementById("profileConfirmPassword").value;
        if (newPass && newPass !== confirmPass) {
          LF.showToast("Passwords do not match.", "error");
          return;
        }
        if (newPass && newPass.length < 6) {
          LF.showToast("Password must be at least 6 characters.", "error");
          return;
        }
        var updates = {
          name: document.getElementById("profileFullName").value.trim(),
          email: document.getElementById("profileEmail").value.trim(),
          phone: document.getElementById("profilePhone").value.trim(),
          department: document.getElementById("profileDepartment").value.trim(),
          title: document.getElementById("profileJobTitle").value.trim(),
          bio: document.getElementById("profileBio").value.trim(),
        };
        if (newPass) updates.password = newPass;
        LF.updateUserProfile(user.id, updates);
        LF.logActivity("user", "Profile updated.", session.username);
        LF.showToast("Profile saved.", "success");
        document.getElementById("profileNewPassword").value = "";
        document.getElementById("profileConfirmPassword").value = "";
        session = LF.getSession();
        var navAvatar = document.getElementById("navAvatar");
        if (navAvatar) {
          navAvatar.textContent = session.username.charAt(0).toUpperCase();
          navAvatar.style.background = session.avatarColor || "var(--accent)";
        }
        var navUserName = document.getElementById("navUserName");
        if (navUserName) navUserName.textContent = session.name || session.username;
        renderProfile();
      });

      renderProfile();
    })();
  </script>
</body>
</html>
